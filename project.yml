name: WhisperIntent
options:
  bundleIdPrefix: com.marklabrecque
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: QS946Z5WWB
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  WhisperIntentCore:
    path: Packages/WhisperIntentCore
  # WhisperKit: pinned in Packages/WhisperIntentCore/Package.swift; the app target
  # consumes it transitively through WhisperIntentCore.

targets:
  WhisperIntent:
    type: application
    platform: iOS
    sources:
      - path: App/WhisperIntent
        excludes:
          # Model dir is added as an explicit folder-reference source below.
          # If we let it recurse into Models/, XcodeGen creates a group and
          # `.mlmodelc` dirs end up flattened to the bundle root.
          - "Resources/Models/openai_whisper-medium"
          - "Resources/Models/openai_whisper-medium/**"
          - "Resources/Models/README.md"
      # Folder reference (blue folder in Xcode) — preserves directory structure
      # so WhisperKit can find model files at <bundle>/openai_whisper-medium/.
      - path: App/WhisperIntent/Resources/Models/openai_whisper-medium
        type: folder
        buildPhase: resources
    info:
      path: App/WhisperIntent/Info.plist
      properties:
        CFBundleDisplayName: Whisper Intent
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: >
          Whisper Intent records your voice when an Apple Shortcut calls the
          Transcribe Speech action. Audio stays on your iPhone.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marklabrecque.whisperintent
        TARGETED_DEVICE_FAMILY: "1" # iPhone only
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    dependencies:
      - package: WhisperIntentCore

  WhisperIntentTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: App/WhisperIntentTests
    dependencies:
      - target: WhisperIntent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marklabrecque.whisperintent.tests

schemes:
  WhisperIntent:
    build:
      targets:
        WhisperIntent: all
        WhisperIntentTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WhisperIntentTests
    archive:
      config: Release
