name: Publish privacy policy

# Renders docs/privacy-policy.md to a single static HTML page and publishes it
# to GitHub Pages. The result is a stable URL suitable for the App Store
# Connect "Privacy Policy URL" field.
#
# This workflow is NOT auto-enabled — turning on Pages for the repo is a
# one-time setting (Settings → Pages → Source: GitHub Actions). Until that
# is enabled, the workflow runs and silently succeeds without publishing.
# Once Pages is enabled, every push to main that touches the privacy policy
# re-publishes.
#
# The hosting layout is intentionally minimal: one HTML page plus a tiny
# inline stylesheet. No Jekyll, no theme, no build system to maintain.

on:
  push:
    branches: [main]
    paths:
      - "docs/privacy-policy.md"
      - ".github/workflows/publish-privacy-policy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render privacy policy to HTML
        run: |
          mkdir -p _site
          cat > _site/index.html <<'HTML_EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Whisper Intent — Privacy Policy</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                     max-width: 720px; margin: 2rem auto; padding: 0 1rem;
                     line-height: 1.6; color: #222; }
              h1, h2 { line-height: 1.2; }
              h1 { border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }
              code { background: #f4f4f4; padding: 0.1em 0.3em; border-radius: 3px; }
              hr { border: 0; border-top: 1px solid #eee; margin: 2rem 0; }
              @media (prefers-color-scheme: dark) {
                body { background: #111; color: #eee; }
                code { background: #222; }
                hr { border-top-color: #333; }
                a { color: #7db9ff; }
              }
            </style>
          </head>
          <body>
          HTML_EOF

          # Convert markdown to HTML using a minimal Python dependency
          # (markdown is in Ubuntu's default Python distribution wheels).
          python3 -m pip install --quiet markdown
          python3 - <<'PY'
          import markdown
          src = open("docs/privacy-policy.md").read()
          html = markdown.markdown(src, extensions=["extra", "sane_lists"])
          open("_site/index.html", "a").write(html)
          PY

          cat >> _site/index.html <<'HTML_EOF'
          </body>
          </html>
          HTML_EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
