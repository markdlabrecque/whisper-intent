name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-package:
    name: Core package (SwiftPM)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
        # NOTE: Update to Xcode 26 when GitHub-hosted runners ship it. Until then,
        # the core package builds against Swift 6 in Xcode 16+ for CI sanity; the
        # app target (with iOS 26 deployment) is built locally on a developer Mac
        # with Xcode 26. Once the runner image has Xcode 26, enable the app-build job.

      - name: Build
        run: |
          cd Packages/WhisperIntentCore
          swift build

      - name: Test
        run: |
          cd Packages/WhisperIntentCore
          swift test

  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install swiftformat swiftlint xcodegen

      - name: Format check
        run: swiftformat --lint .

      - name: Lint
        run: swiftlint --strict

      - name: Verify XcodeGen project.yml is valid
        run: xcodegen generate --spec project.yml --project /tmp/xcodegen-validate

